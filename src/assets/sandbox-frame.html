<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP for the preview sandbox (charm T-026).

      The iframe is mounted sandboxed with `allow-scripts` only (no `allow-same-origin`),
      so its document runs on an OPAQUE origin. That means `script-src 'self'` can never
      match anything (there is no real origin to be "self"), so the runtime is delivered
      as inline <script> blocks (PreviewPanel injects them via srcdoc) -- hence
      'unsafe-inline'. The COMPILED user animation is still injected via a blob: URL
      <script>, never eval()/new Function(). connect-src 'none' means the sandbox cannot
      reach the network: no exfiltration, fully offline.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline' blob:; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!--
      PreviewPanel replaces this token with inline <script> blocks for
      react.production.min.js, react-dom.production.min.js, and preview-runtime.js
      (all shipped locally as Tauri resources; no CDN). They expose window.React,
      window.ReactDOM, and window.RemotionRuntime.
    -->
    <!--RUNTIME-->

    <script>
      (function () {
        "use strict";

        // Composition format: 9:16 vertical short-form video. fps and durationInFrames
        // are DEFAULTS -- an animation may override them by exporting its own values
        // (see resolveConfig below). Width/height are fixed at 1080x1920.
        var DEFAULT_FPS = 30;
        var DEFAULT_DURATION_IN_FRAMES = 150;
        var COMPOSITION = {
          durationInFrames: DEFAULT_DURATION_IN_FRAMES,
          fps: DEFAULT_FPS,
          compositionWidth: 1080,
          compositionHeight: 1920,
        };

        // A valid override is a finite number > 0; everything else falls back to the
        // default. We accept fractional fps (e.g. 24000/1001) but floor the duration to a
        // whole frame count since the Player counts integer frames.
        function resolvePositive(value, fallback, floor) {
          var n = typeof value === "number" ? value : Number(value);
          if (!isFinite(n) || n <= 0) return fallback;
          return floor ? Math.floor(n) : n;
        }

        // Read fps/durationInFrames the animation may have exported. Supports either
        // top-level `export const fps` / `export const durationInFrames`, or a single
        // `export const config = { fps, durationInFrames }`. Top-level values win when
        // both are present.
        function resolveConfig(exported) {
          var e = exported || {};
          var cfg = e.config && typeof e.config === "object" ? e.config : {};
          var fps = e.fps !== undefined ? e.fps : cfg.fps;
          var duration =
            e.durationInFrames !== undefined ? e.durationInFrames : cfg.durationInFrames;
          return {
            fps: resolvePositive(fps, DEFAULT_FPS, false),
            durationInFrames: resolvePositive(
              duration,
              DEFAULT_DURATION_IN_FRAMES,
              true,
            ),
          };
        }

        var playerRef = null;
        var root = null;
        // Render props that are NOT controllable via the player ref -- changing speed or
        // loop means re-rendering the Player with new props.
        var renderState = {
          Component: null,
          playbackRate: 1,
          loop: false,
        };

        function post(msg) {
          parent.postMessage(msg, "*");
        }

        function renderPlayer() {
          if (!renderState.Component || !root) return;
          root.render(
            window.React.createElement(window.RemotionRuntime.Player, {
              component: renderState.Component,
              durationInFrames: COMPOSITION.durationInFrames,
              fps: COMPOSITION.fps,
              compositionWidth: COMPOSITION.compositionWidth,
              compositionHeight: COMPOSITION.compositionHeight,
              playbackRate: renderState.playbackRate,
              loop: renderState.loop,
              controls: false,
              clickToPlay: false,
              doubleClickToFullscreen: false,
              style: { width: "100%", height: "100%" },
              ref: function (r) {
                playerRef = r;
              },
            }),
          );
        }

        // The animation bundle is compiled in esbuild TRANSFORM mode, so an import of a
        // module the sandbox does not provide is emitted as a bare `require("<mod>")`
        // call. There is no module loader here, so define a `require` that throws a
        // clear, NAMED error -- otherwise the user just sees a cryptic
        // "require is not defined". The supported modules (react, react-dom, remotion,
        // @remotion/player) are rewritten to window globals at compile time and never
        // reach this shim.
        window.require = function (name) {
          throw new Error(
            "This animation imports '" +
              name +
              "', which isn't available in the preview runtime. Only 'react', " +
              "'react-dom', 'remotion', and '@remotion/player' can be imported.",
          );
        };

        // Inject the compiled animation IIFE as a blob-URL <script> (NOT eval) so we never
        // need CSP 'unsafe-eval'. It assigns window.AnimationExports.
        //
        // A blob script that THROWS while executing (e.g. the require shim above, or any
        // runtime error in the animation) still fires `onload` -- the runtime exception
        // goes to the window 'error' event, NOT the script's `onerror`. We capture that
        // exception via a one-shot listener and resolve with it, so the caller can
        // surface the REAL cause instead of the misleading generic "must export default"
        // message. Resolves with the captured Error, or null if the bundle ran clean.
        function runBundle(code) {
          return new Promise(function (resolve, reject) {
            var blob = new Blob([code], { type: "text/javascript" });
            var url = URL.createObjectURL(blob);
            var s = document.createElement("script");
            s.src = url;
            var runtimeError = null;
            function onError(event) {
              if (runtimeError) return; // keep the first error
              runtimeError =
                (event && event.error) ||
                new Error((event && event.message) || "Error running animation.");
            }
            window.addEventListener("error", onError);
            function cleanup() {
              window.removeEventListener("error", onError);
              URL.revokeObjectURL(url);
            }
            s.onload = function () {
              cleanup();
              resolve(runtimeError);
            };
            s.onerror = function () {
              cleanup();
              reject(new Error("Failed to execute compiled animation bundle."));
            };
            document.head.appendChild(s);
          });
        }

        window.addEventListener("message", function (event) {
          var data = event.data || {};

          if (data.type === "render") {
            (async function () {
              try {
                if (!window.React || !window.ReactDOM || !window.RemotionRuntime) {
                  throw new Error("Preview runtime failed to load.");
                }
                // Fresh global before each run so a failed compile can't leave a stale component.
                window.AnimationExports = undefined;
                var runtimeError = await runBundle(data.bundle);

                var exported = window.AnimationExports;
                var Component = exported && (exported.default || exported.Main);
                if (typeof Component !== "function") {
                  // No component AND the bundle threw while executing (unsupported
                  // import, runtime error, ...): that thrown error is the REAL reason
                  // there are no exports, so surface it instead of the misleading
                  // generic message below.
                  if (runtimeError) {
                    throw runtimeError;
                  }
                  throw new Error(
                    "Animation must `export default` a React component.",
                  );
                }

                // Let the animation override fps/duration via its exports; fall back to
                // defaults when unset/invalid. Applied to COMPOSITION so renderPlayer and
                // the frameUpdate tick both pick them up.
                var resolved = resolveConfig(exported);
                COMPOSITION.fps = resolved.fps;
                COMPOSITION.durationInFrames = resolved.durationInFrames;

                renderState.Component = Component;
                if (!root) {
                  root = window.ReactDOM.createRoot(document.getElementById("root"));
                }
                renderPlayer();
                post({
                  type: "renderOk",
                  fps: COMPOSITION.fps,
                  durationInFrames: COMPOSITION.durationInFrames,
                });
              } catch (err) {
                post({
                  type: "renderError",
                  message: err && err.message ? err.message : String(err),
                });
              }
            })();
            return;
          }

          if (data.type === "play") {
            if (playerRef) playerRef.play();
          } else if (data.type === "pause") {
            if (playerRef) playerRef.pause();
          } else if (data.type === "seek") {
            if (playerRef) playerRef.seekTo(data.frame);
          } else if (data.type === "setSpeed") {
            renderState.playbackRate = data.speed;
            renderPlayer();
          } else if (data.type === "setLoop") {
            renderState.loop = !!data.loop;
            renderPlayer();
          }
        });

        // Stream the current frame to the parent for the timeline/replay UI.
        var lastFrame = -1;
        var lastPlaying = null;
        (function tick() {
          if (playerRef) {
            var frame = playerRef.getCurrentFrame();
            var playing = playerRef.isPlaying();
            if (frame !== lastFrame || playing !== lastPlaying) {
              lastFrame = frame;
              lastPlaying = playing;
              post({
                type: "frameUpdate",
                frame: frame,
                totalFrames: COMPOSITION.durationInFrames,
                fps: COMPOSITION.fps,
                isPlaying: playing,
              });
            }
          }
          requestAnimationFrame(tick);
        })();

        // Tell the parent the sandbox shell is ready to receive a render.
        post({ type: "sandboxReady" });
      })();
    </script>
  </body>
</html>
